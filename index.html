<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ate Jeeyah - Happy Birthday</title>
    <style>
        :root {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #fff4f8 0%, #ffe2e8 45%, #ffe9f2 100%);
            color: #2b2b2b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
            overflow: visible;
        }

        .page {
            position: relative;
            z-index: 1;
            width: min(100%, 700px);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .content {
            position: relative;
            z-index: 1;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .background-peek {
            position: absolute;
            top: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: clamp(200px, 30vw, 320px);
            opacity: 0.9;
            z-index: 0;
            pointer-events: none;
        }

        .title {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3.4rem);
            letter-spacing: 0.08em;
            color: #b43c76;
        }

        .message {
            margin: 1.4rem auto 0;
            max-width: 38rem;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #4b4b4b;
        }

        .video {
            position: relative;
            margin: 2rem auto 1rem;
            width: 100%;
            padding-top: 56.25%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(180, 60, 118, 0.18);
            background: #000;
        }

        .video iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .note {
            margin-top: 0.75rem;
            color: #7a5174;
            font-size: 0.95rem;
        }

        @media (max-width: 560px) {
            .content {
                padding: 1.5rem 1rem;
            }

            .message {
                font-size: 1rem;
            }

            .title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="content">
            <h1 class="title">Happy Birthday, Ate Gail!</h1>
            <div class="video">
                <iframe src="https://www.youtube.com/embed/u57HBBO1zV4?autoplay=1&mute=0&rel=0" title="Birthday surprise video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
            <p class="message" id="customMessage">A very special day to a very special person. Happy birthdayy ate Gail!!❤️ and advance happy mother’s day! Binati ka na ulit ng paborito mong kapatid plus ng bf niya:p okay na yan</p>
            <p class="note">Gawa po ni Sen. Happy Birthday Ate</p>
        </section>
    </main>
    <img class="background-peek" src="125530dd-5ed2-493d-953b-204ced520839-removebg-preview.png" alt="Peek image">
</body>
</html>
